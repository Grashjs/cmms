# System path passthrough
[[redirects]]
  from = "/api/*"
  to = "/api/:splat"
  status = 200

[[redirects]]
  from = "/_next/*"
  to = "/_next/:splat"
  status = 200

[[redirects]]
  from = "/_vercel/*"
  to = "/_vercel/:splat"
  status = 200
[[redirects]]
  from = "/public/*"
  to = "/public/:splat"
status = 200
# Catch-all — rewrite any unhandled path to /en
[[redirects]]
  from = "/*"
  to = "/en/:splat"
  status = 200

# Cache headers
[[headers]]
  for = "/*"
  [headers.values]
    Cache-Control = "public, s-maxage=3600, stale-while-revalidate=86400"

[[headers]]
  for = "/_next/static/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/static/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"
