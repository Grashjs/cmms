# Specific route rewrites (must come before catch-all)
[[redirects]]
  from = "/"
  to = "/en"
  status = 200

[[redirects]]
  from = "/free-cmms"
  to = "/en/free-cmms"
  status = 200

[[redirects]]
  from = "/deletion-policy"
  to = "/en/deletion-policy"
  status = 200

# Locale passthrough — let these reach the correct static file
[[redirects]]
  from = "/en/*"
  to = "/en/:splat"
  status = 200

[[redirects]]
  from = "/es/*"
  to = "/es/:splat"
  status = 200

[[redirects]]
  from = "/fr/*"
  to = "/fr/:splat"
  status = 200

